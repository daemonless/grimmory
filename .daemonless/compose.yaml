# CIT test compose file
name: grimmory-test

services:
  grimmory:
    image: ghcr.io/daemonless/grimmory:build
    network_mode: host
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mariadb://127.0.0.1:3306/grimmory"
      SPRING_DATASOURCE_USERNAME: "grimmory"
      SPRING_DATASOURCE_PASSWORD: "testpass"
      JAVA_OPTS: "-Xmx512m"
    volumes:
      - grimmory-data:/app/data
      - grimmory-books:/books
    depends_on:
      - mariadb

  mariadb:
    image: ghcr.io/daemonless/mariadb:11.4
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: "rootpass"
      MYSQL_DATABASE: "grimmory"
      MYSQL_USER: "grimmory"
      MYSQL_PASSWORD: "testpass"
    volumes:
      - mariadb-data:/config

volumes:
  grimmory-data:
  grimmory-books:
  mariadb-data:
